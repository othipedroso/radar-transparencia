name: Atualizar Dados Diariamente

on:
  schedule:
    - cron: '0 3 * * *' # Roda às 03:00 (horário UTC)
  workflow_dispatch: # Permite que você clique em "Run workflow" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para o script conseguir salvar o arquivo no repo
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Instalar dependências
        run: pip install requests
      - name: Executar Script
        run: python atualizar_dados.py
      - name: Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_deputados.json
          git commit -m "Auto-update: Dados de deputados atualizados" || exit 0
          git push