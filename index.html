<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Transparência 2026</title>
    <style>
        :root { --primary: #1a5276; --success: #27ae60; --danger: #c0392b; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #2c3e50; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Vitrine */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px 0; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        
        /* Modal Corporativo */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #fdfdfd; margin: 5vh auto; padding: 20px; border-radius: 16px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        
        /* Gastos - Layout Limpo */
        .gasto-item { background: white; border: 1px solid #e1e1e1; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .gasto-valor { font-weight: bold; color: var(--danger); }
        
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ Radar Transparência 2026</h1>
    <input type="text" id="busca" placeholder="Filtrar por nome..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">
    <div id="vitrine" class="vitrine"></div>
</div>

<div id="meuModal" class="modal">
    <div class="modal-content">
        <span onclick="fecharModal()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <div id="headerPolitico" style="text-align:center;"></div>
        <div class="tab-container" style="display:flex; gap:10px; margin:20px 0;">
            <button onclick="mudarTab('tab-gastos')">💸 Gastos</button>
            <button onclick="mudarTab('tab-leis')">📊 Leis</button>
        </div>
        <div id="tab-gastos" class="tab-content"></div>
        <div id="tab-leis" class="tab-content" style="display:none;"></div>
    </div>
</div>

<script>
    let todosPoliticos = [];

    async function iniciar() {
        const res = await fetch('https://dadosabertos.camara.leg.br/api/v2/deputados?itens=50&ordem=ASC&ordenarPor=nome');
        const json = await res.json();
        todosPoliticos = json.dados;
        renderizar(todosPoliticos);
    }

    function renderizar(lista) {
        document.getElementById('vitrine').innerHTML = lista.map(p => `
            <div class="card" onclick="abrirDossie(${p.id}, '${p.nome}', '${p.urlFoto}')">
                <img src="${p.urlFoto}">
                <p style="font-size:12px; margin:5px 0;">${p.nome}</p>
            </div>`).join('');
    }

    async function abrirDossie(id, nome, foto) {
        document.getElementById('meuModal').style.display = "block";
        document.getElementById('headerPolitico').innerHTML = `<img src="${foto}" style="width:80px;border-radius:50%"><h2>${nome}</h2>`;
        
        const tabs = ['tab-gastos', 'tab-leis'];
        tabs.forEach(t => document.getElementById(t).innerHTML = '<div class="loading-spinner"></div>');

        // Carregamento paralelo com segurança
        await Promise.allSettled([carregarGastos(id), carregarLeis(id)]);
    }

   async function carregarGastos(id) {
    const tab = document.getElementById('tab-gastos');
    try {
        const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?itens=100&ordem=DESC`);
        const json = await res.json();
        
        // 1. Agrupamento Inteligente
        const stats = json.dados.reduce((acc, g) => {
            const key = g.nomeFornecedor;
            if (!acc[key]) {
                acc[key] = { total: 0, count: 0, cnpj: g.cnpjCpf, tipo: g.tipoDespesa };
            }
            acc[key].total += g.valorLiquido;
            acc[key].count += 1;
            return acc;
        }, {});

        // 2. Ordena pelos fornecedores mais recorrentes ou caros
        const listaFornecedores = Object.entries(stats).sort((a, b) => b[1].total - a[1].total);

        tab.innerHTML = `
            <div style="background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <small style="opacity: 0.7;">TOTAL ANALISADO</small>
                <div style="font-size: 24px;">R$ ${json.dados.reduce((a, b) => a + b.valorLiquido, 0).toLocaleString('pt-BR')}</div>
            </div>
            ${listaFornecedores.map(([nome, dados]) => `
                <div style="background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 8px;">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="color: var(--primary);">${nome.substring(0, 25)}</b>
                        <b style="color: var(--danger);">R$ ${dados.total.toLocaleString('pt-BR')}</b>
                    </div>
                    <div style="font-size: 11px; color: #666; margin-top: 5px;">
                        ${dados.count} nota(s) emitida(s) | ${dados.tipo}
                    </div>
                    <div style="font-size: 10px; color: #999; font-family: monospace;">CNPJ: ${dados.cnpj}</div>
                </div>
            `).join('')}
        `;
    } catch (e) { tab.innerHTML = "Erro ao auditar despesas."; }
} 

    async function carregarLeis(id) {
        const tab = document.getElementById('tab-leis');
        tab.innerHTML = "<p>Dados de produtividade via API oficial da Câmara.</p>";
    }

    function mudarTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function fecharModal() { document.getElementById('meuModal').style.display = "none"; }

    document.getElementById('busca').addEventListener('input', (e) => {
        const t = e.target.value.toLowerCase();
        renderizar(todosPoliticos.filter(p => p.nome.toLowerCase().includes(t)));
    });

    iniciar();
</script>
</body>
</html>
